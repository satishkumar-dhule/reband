name: 'Setup Node.js with pnpm'
description: 'Sets up Node.js, pnpm, and installs dependencies with caching'

inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '20'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '10'
  install:
    description: 'Run pnpm install'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ''

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Cache pnpm store
      if: inputs.install == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-pnpm-

    - name: Cache Vite build
      if: inputs.install == 'true'
      uses: actions/cache@v4
      with:
        path: node_modules/.vite
        key: ${{ runner.os }}-vite-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.{ts,tsx,js,jsx,json}') }}
        restore-keys: |
          ${{ runner.os }}-vite-${{ hashFiles('**/pnpm-lock.yaml') }}-
          ${{ runner.os }}-vite-

    - name: Cache TypeScript build info
      if: inputs.install == 'true'
      uses: actions/cache@v4
      with:
        path: node_modules/typescript/tsbuildinfo
        key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.{ts,tsx}') }}
        restore-keys: |
          ${{ runner.os }}-tsbuildinfo-${{ hashFiles('**/pnpm-lock.yaml') }}-
          ${{ runner.os }}-tsbuildinfo-

    - name: Cache Playwright browsers
      if: inputs.install == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/playwright.config.ts') }}
        restore-keys: |
          ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}-
          ${{ runner.os }}-playwright-

    - name: Cache Pagefind build
      if: inputs.install == 'true'
      uses: actions/cache@v4
      with:
        path: dist/public/pagefind
        key: ${{ runner.os }}-pagefind-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.{ts,tsx,js,jsx,json,md}') }}
        restore-keys: |
          ${{ runner.os }}-pagefind-${{ hashFiles('**/pnpm-lock.yaml') }}-
          ${{ runner.os }}-pagefind-

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --no-frozen-lockfile
