name: 🔁 Autonomous Perf Loop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: perf-loop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-perf-loop:
    name: 🔁 Run Perf Loop
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run autonomous perf loop
        run: ITERATIONS=100 node scripts/autonomous_perf_loop.js

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-loop-${{ github.run_number }}
          path: perf/
          retention-days: 7
