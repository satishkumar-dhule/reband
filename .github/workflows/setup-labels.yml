name: 🏷️ Setup Repository Labels

# Creates or updates labels required by the issue processor system.
# Run once on setup or whenever this file changes.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/setup-labels.yml'

permissions:
  issues: write

jobs:
  setup-labels:
    name: 🏷️ Create / Update Labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sync labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [
              { name: 'bot:processor',  color: '0052cc', description: 'Issue created by QuestionFeedback component for processing' },
              { name: 'bot:in-progress',color: 'fbca04', description: 'Issue is currently being processed by the bot' },
              { name: 'bot:completed',  color: '0e8a16', description: 'Issue has been successfully processed by the bot' },
              { name: 'bot:failed',     color: 'd93f0b', description: 'Issue processing failed' },
              { name: 'feedback:improve', color: '1d76db', description: 'Request to improve existing question content' },
              { name: 'feedback:rewrite', color: 'f9d0c4', description: 'Request to completely rewrite question content' },
              { name: 'feedback:disable', color: 'b60205', description: 'Request to disable/remove question' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name:  label.name,
                });
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
                console.log(`✅ Updated: ${label.name}`);
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    ...label,
                  });
                  console.log(`🆕 Created: ${label.name}`);
                } else {
                  console.error(`❌ Error with ${label.name}: ${err.message}`);
                }
              }
            }

            const { data: all } = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            console.log(`\n📋 Total labels in repo: ${all.length}`);

      - name: Summary
        run: |
          {
            echo "## 🏷️ Repository Labels Setup"
            echo ""
            echo "**Status:** Complete"
            echo ""
            echo "| Label | Purpose |"
            echo "|-------|---------|"
            echo "| \`bot:processor\`   | Queued for processing |"
            echo "| \`bot:in-progress\` | Currently being processed |"
            echo "| \`bot:completed\`   | Successfully processed |"
            echo "| \`bot:failed\`      | Processing failed |"
            echo "| \`feedback:improve\` | Improve question |"
            echo "| \`feedback:rewrite\` | Rewrite question |"
            echo "| \`feedback:disable\` | Disable question |"
            echo ""
            echo "**Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
