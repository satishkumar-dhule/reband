name: 🚀 Deploy App

# Deploys the main interview app to GitHub Pages
# Triggers: On push to main, or manual dispatch

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/content-pipeline.yml'
      - '.github/workflows/deploy-blog.yml'
      - '.github/workflows/social-analytics.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-app-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Fetch questions data
        run: node script/fetch-questions-for-build.js
        env:
          TURSO_DATABASE_URL_RO: ${{ secrets.TURSO_DATABASE_URL_RO }}
          TURSO_AUTH_TOKEN_RO: ${{ secrets.TURSO_AUTH_TOKEN_RO }}
      
      - name: Fetch question history
        run: node script/fetch-question-history.js
        env:
          TURSO_DATABASE_URL_RO: ${{ secrets.TURSO_DATABASE_URL_RO }}
          TURSO_AUTH_TOKEN_RO: ${{ secrets.TURSO_AUTH_TOKEN_RO }}
      
      - name: Generate curated paths
        run: node script/generate-curated-paths.js
        env:
          TURSO_DATABASE_URL_RO: ${{ secrets.TURSO_DATABASE_URL_RO }}
          TURSO_AUTH_TOKEN_RO: ${{ secrets.TURSO_AUTH_TOKEN_RO }}
      
      - name: Generate RSS feed
        run: node script/generate-rss.js
        env:
          TURSO_DATABASE_URL_RO: ${{ secrets.TURSO_DATABASE_URL_RO }}
          TURSO_AUTH_TOKEN_RO: ${{ secrets.TURSO_AUTH_TOKEN_RO }}
      
      - name: Generate sitemap
        run: node script/generate-sitemap.js
        env:
          TURSO_DATABASE_URL_RO: ${{ secrets.TURSO_DATABASE_URL_RO }}
          TURSO_AUTH_TOKEN_RO: ${{ secrets.TURSO_AUTH_TOKEN_RO }}
      
      - name: Fetch bot monitor data
        run: node script/fetch-bot-monitor-data.js
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Install Playwright (if not cached)
        run: |
          if [ ! -d "$HOME/.cache/ms-playwright" ] || [ -z "$(ls -A "$HOME/.cache/ms-playwright")" ]; then
            echo "Installing Playwright browsers..."
            pnpm exec playwright install --with-deps chromium
          else
            echo "Playwright browsers cached, skipping install"
          fi

      - name: Build application
        run: |
          pnpm run build
          pnpm run build:pagefind

      - name: Run E2E tests
        run: |
          # Run only core smoke tests in CI
          pnpm exec playwright test e2e/core.spec.ts --project=chromium-desktop
        env:
          CI: 'true'

      - name: Compress test results
        if: failure()
        run: |
          tar -czf test-results.tar.gz test-results/ 2>/dev/null || true
        shell: bash

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results.tar.gz
          retention-days: 3

      - name: Compress build artifacts
        run: |
          tar -czf build.tar.gz -C dist/public .
        shell: bash

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build.tar.gz
          retention-days: 1

  staging:
    name: 🧪 Deploy Staging
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://stage-open-interview.github.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: .
      
      - name: Decompress build artifacts
        run: |
          mkdir -p dist
          tar -xzf build.tar.gz -C dist
          rm build.tar.gz
        shell: bash

      - uses: ./.github/actions/deploy-pages
        with:
          source-dir: dist
          repo: stage-open-interview/stage-open-interview.github.io
          branch: main
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'Deploy: ${{ github.sha }}'
          preserve-cname: 'false'

  production:
    name: 🌐 Deploy Production
    needs: staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://open-interview.github.io
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: .
      
      - name: Decompress build artifacts
        run: |
          mkdir -p dist
          tar -xzf build.tar.gz -C dist
          rm build.tar.gz
        shell: bash

      - uses: ./.github/actions/deploy-pages
        with:
          source-dir: dist
          repo: open-interview/open-interview.github.io
          branch: gh-pages
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'Deploy: ${{ github.sha }}'
          preserve-cname: 'true'

      - name: Ping search engines
        run: node script/ping-search-engines.js
        continue-on-error: true

      - name: Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | https://stage-open-interview.github.io |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | https://open-interview.github.io |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
