name: 🚀 Deploy App

# Deploys the main interview app to GitHub Pages
# Triggers: On push to main, or manual dispatch

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/content-pipeline.yml'
      - '.github/workflows/deploy-blog.yml'
      - '.github/workflows/social-analytics.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-app-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Fetch and generate data (parallel)
        run: |
          echo "Starting parallel data fetching..."
          
          # Create log directory
          mkdir -p logs
          
          # Start all data fetching/generation scripts in parallel with logging
          node script/fetch-questions-for-build.js > logs/fetch-questions.log 2>&1 &
          PID1=$!
          echo "PID1: fetch-questions-for-build.js"
          
          node script/fetch-question-history.js > logs/fetch-history.log 2>&1 &
          PID2=$!
          echo "PID2: fetch-question-history.js"
          
          node script/generate-curated-paths.js > logs/generate-paths.log 2>&1 &
          PID3=$!
          echo "PID3: generate-curated-paths.js"
          
          node script/generate-rss.js > logs/generate-rss.log 2>&1 &
          PID4=$!
          echo "PID4: generate-rss.js"
          
          node script/generate-sitemap.js > logs/generate-sitemap.log 2>&1 &
          PID5=$!
          echo "PID5: generate-sitemap.js"
          
          node script/fetch-bot-monitor-data.js > logs/fetch-bot-monitor.log 2>&1 &
          PID6=$!
          echo "PID6: fetch-bot-monitor-data.js"
          
          # Wait for all background jobs and capture exit codes
          FAILED_PIDS=""
          for pid in $PID1 $PID2 $PID3 $PID4 $PID5 $PID6; do
            if ! wait $pid; then
              FAILED_PIDS="$FAILED_PIDS $pid"
            fi
          done
          
          if [ -n "$FAILED_PIDS" ]; then
            echo "❌ The following data fetching scripts failed:$FAILED_PIDS"
            echo ""
            echo "Failure details:"
            for pid in $FAILED_PIDS; do
              case $pid in
                $PID1) echo "- fetch-questions-for-build.js"; cat logs/fetch-questions.log ;;
                $PID2) echo "- fetch-question-history.js"; cat logs/fetch-history.log ;;
                $PID3) echo "- generate-curated-paths.js"; cat logs/generate-paths.log ;;
                $PID4) echo "- generate-rss.js"; cat logs/generate-rss.log ;;
                $PID5) echo "- generate-sitemap.js"; cat logs/generate-sitemap.log ;;
                $PID6) echo "- fetch-bot-monitor-data.js"; cat logs/fetch-bot-monitor.log ;;
              esac
            done
            exit 1
          fi
          
          echo "✅ All data fetching scripts completed successfully"
          echo "Logs available in logs/"

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: |
            dist
            client/public/data
          key: ${{ runner.os }}-dist-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('client/src/**/*.{ts,tsx}', 'vite.config.ts', 'shared/**/*.{ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-dist-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-dist-

      - name: Install Playwright (if not cached)
        run: |
          if [ ! -d "$HOME/.cache/ms-playwright" ] || [ -z "$(ls -A "$HOME/.cache/ms-playwright")" ]; then
            echo "Installing Playwright browsers..."
            pnpm exec playwright install --with-deps chromium
          else
            echo "Playwright browsers cached, skipping install"
          fi

      - name: Build application
        run: |
          pnpm run build
          pnpm run build:pagefind
          node script/build-optimize.js

      - name: Run E2E tests
        run: |
          # Run only core smoke tests in CI
          pnpm exec playwright test e2e/core.spec.ts --project=chromium-desktop
        env:
          CI: 'true'

      - name: Compress test results
        if: failure()
        run: |
          tar -czf test-results.tar.gz test-results/ 2>/dev/null || true
        shell: bash

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results.tar.gz
          retention-days: 3

      - name: Compress build artifacts
        run: |
          tar -czf build.tar.gz -C dist/public .
          echo "Build artifact size: $(du -sh build.tar.gz | cut -f1)"
        shell: bash

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build.tar.gz
          retention-days: 1

  staging:
    name: 🧪 Deploy Staging
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://stage-open-interview.github.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: .
      
      - name: Decompress build artifacts
        run: |
          mkdir -p dist
          tar -xzf build.tar.gz -C dist
          rm build.tar.gz
        shell: bash

      - uses: ./.github/actions/deploy-pages
        with:
          source-dir: dist
          repo: stage-open-interview/stage-open-interview.github.io
          branch: main
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'Deploy: ${{ github.sha }}'
          preserve-cname: 'false'

  production:
    name: 🌐 Deploy Production
    needs: staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://open-interview.github.io
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: .
      
      - name: Decompress build artifacts
        run: |
          mkdir -p dist
          tar -xzf build.tar.gz -C dist
          rm build.tar.gz
        shell: bash

      - uses: ./.github/actions/deploy-pages
        with:
          source-dir: dist
          repo: open-interview/open-interview.github.io
          branch: gh-pages
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'Deploy: ${{ github.sha }}'
          preserve-cname: 'true'

      - name: Ping search engines
        run: node script/ping-search-engines.js
        continue-on-error: true

      - name: Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | https://stage-open-interview.github.io |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | https://open-interview.github.io |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  verify-deployment:
    name: 🔍 Verify Production Deployment
    needs: production
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to propagate
        run: sleep 30
      
      - name: Verify site accessibility
        run: |
          echo "Checking if production site is accessible..."
          
          # Check main site
          if ! curl -s --max-time 30 --retry 3 --retry-delay 5 "https://open-interview.github.io" > /dev/null; then
            echo "❌ Production site is not accessible"
            exit 1
          fi
          
          # Check staging site
          if ! curl -s --max-time 30 --retry 3 --retry-delay 5 "https://stage-open-interview.github.io" > /dev/null; then
            echo "❌ Staging site is not accessible"
            exit 1
          fi
          
          echo "✅ Both sites are accessible"
      
      - name: Verify content integrity
        run: |
          echo "Checking for expected content..."
          
          # Check for expected elements in production
          content=$(curl -s --max-time 30 "https://open-interview.github.io")
          
          # Check for common issues
          if echo "$content" | grep -q "Error"; then
            echo "❌ Site contains error messages"
            exit 1
          fi
          
          if echo "$content" | grep -q "404"; then
            echo "❌ Site contains 404 references"
            exit 1
          fi
          
          echo "✅ Content integrity verified"
      
      - name: Verify critical pages
        run: |
          echo "Checking critical pages..."
          
          critical_pages=(
            "https://open-interview.github.io"
            "https://open-interview.github.io/practice"
            "https://open-interview.github.io/learn"
          )
          
          for page in "${critical_pages[@]}"; do
            echo "Checking: $page"
            if ! curl -s --max-time 30 --retry 2 --retry-delay 3 "$page" > /dev/null; then
              echo "❌ Failed to access: $page"
              exit 1
            fi
          done
          
          echo "✅ All critical pages accessible"

  rollback-preparation:
    name: 🛡️ Prepare Rollback Plan
    needs: production
    runs-on: ubuntu-latest
    if: always() && needs.production.result != 'skipped'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate rollback instructions
        run: |
          echo "## 🛡️ Rollback Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**If deployment issues are detected:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **Manual Rollback:**" >> $GITHUB_STEP_SUMMARY
          echo "   - Go to GitHub Actions" >> $GITHUB_STEP_SUMMARY
          echo "   - Find the last successful deployment" >> $GITHUB_STEP_SUMMARY
          echo "   - Re-run that workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "2. **Git Rollback:**" >> $GITHUB_STEP_SUMMARY
          echo "   \`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "   git revert ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "   git push" >> $GITHUB_STEP_SUMMARY
          echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Current Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload deployment metadata
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metadata-${{ github.sha }}
          path: |
            dist/**
            !dist/node_modules
          retention-days: 7
