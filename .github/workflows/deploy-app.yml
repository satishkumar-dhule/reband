name: 🚀 Deploy App

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/deploy-blog.yml'
      - '.github/workflows/social-media.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-app-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Fetch and generate data (parallel)
        run: |
          mkdir -p logs
          node script/fetch-questions-for-build.js  > logs/fetch-questions.log 2>&1 &  PID1=$!
          node script/fetch-question-history.js     > logs/fetch-history.log   2>&1 &  PID2=$!
          node script/generate-curated-paths.js     > logs/gen-paths.log       2>&1 &  PID3=$!
          node script/generate-rss.js               > logs/gen-rss.log         2>&1 &  PID4=$!
          node script/generate-sitemap.js           > logs/gen-sitemap.log     2>&1 &  PID5=$!
          node script/fetch-bot-monitor-data.js     > logs/bot-monitor.log     2>&1 &  PID6=$!

          declare -A PIDS=([1]=$PID1 [2]=$PID2 [3]=$PID3 [4]=$PID4 [5]=$PID5 [6]=$PID6)
          declare -A NAMES=(
            [1]="fetch-questions-for-build"
            [2]="fetch-question-history"
            [3]="generate-curated-paths"
            [4]="generate-rss"
            [5]="generate-sitemap"
            [6]="fetch-bot-monitor-data"
          )
          declare -A LOGS=(
            [1]="logs/fetch-questions.log"
            [2]="logs/fetch-history.log"
            [3]="logs/gen-paths.log"
            [4]="logs/gen-rss.log"
            [5]="logs/gen-sitemap.log"
            [6]="logs/bot-monitor.log"
          )

          FAILED=()
          for i in 1 2 3 4 5 6; do
            if ! wait "${PIDS[$i]}"; then
              FAILED+=("$i")
            fi
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "❌ The following scripts failed:"
            for i in "${FAILED[@]}"; do
              echo ""
              echo "--- ${NAMES[$i]} ---"
              cat "${LOGS[$i]}"
            done
            exit 1
          fi
          echo "✅ All data scripts completed"

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: |
            dist
            client/public/data
          key: ${{ runner.os }}-dist-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('client/src/**/*.{ts,tsx}', 'vite.config.ts', 'shared/**/*.{ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-dist-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-dist-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build application
        run: |
          pnpm run build
          pnpm run build:pagefind
          node script/build-optimize.js

      - name: Run smoke E2E tests
        run: pnpm exec playwright test e2e/smoke/unified-smoke.spec.ts --project=chromium-desktop
        env:
          CI: 'true'

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 3

      - name: Package build
        run: |
          tar -czf build.tar.gz -C dist/public .
          echo "Build size: $(du -sh build.tar.gz | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build.tar.gz
          retention-days: 1

  staging:
    name: 🧪 Deploy Staging
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
      url: https://stage-open-interview.github.io
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}

      - name: Unpack build
        run: mkdir -p dist && tar -xzf build.tar.gz -C dist && rm build.tar.gz

      - uses: ./.github/actions/deploy-pages
        with:
          source-dir: dist
          repo: stage-open-interview/stage-open-interview.github.io
          branch: main
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'Deploy: ${{ github.sha }}'
          preserve-cname: 'false'

  production:
    name: 🌐 Deploy Production
    needs: staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://open-interview.github.io
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}

      - name: Unpack build
        run: mkdir -p dist && tar -xzf build.tar.gz -C dist && rm build.tar.gz

      - uses: ./.github/actions/deploy-pages
        with:
          source-dir: dist
          repo: open-interview/open-interview.github.io
          branch: gh-pages
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'Deploy: ${{ github.sha }}'
          preserve-cname: 'true'

      - name: Ping search engines
        run: node script/ping-search-engines.js
        continue-on-error: true

      - name: Summary
        run: |
          {
            echo "## 🚀 Deployment Complete"
            echo ""
            echo "| Environment | URL |"
            echo "|-------------|-----|"
            echo "| Staging     | https://stage-open-interview.github.io |"
            echo "| Production  | https://open-interview.github.io |"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: 🔍 Verify Deployment
    needs: production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for propagation
        run: sleep 30

      - name: Check sites are reachable
        run: |
          check_url() {
            local url="$1"
            local label="$2"
            if ! curl -sSf --max-time 30 --retry 3 --retry-delay 10 "$url" -o /dev/null; then
              echo "❌ $label is not accessible: $url"
              return 1
            fi
            echo "✅ $label OK"
          }
          check_url "https://open-interview.github.io"       "Production"
          check_url "https://stage-open-interview.github.io" "Staging"

      - name: Check critical pages
        run: |
          pages=(
            "https://open-interview.github.io"
            "https://open-interview.github.io/practice"
            "https://open-interview.github.io/learn"
          )
          for page in "${pages[@]}"; do
            if ! curl -sSf --max-time 30 --retry 2 --retry-delay 5 "$page" -o /dev/null; then
              echo "❌ Failed: $page"
              exit 1
            fi
            echo "✅ $page"
          done
