name: 🤖 Content Generation

# Generates all 6 content types via the parallel swarm:
# questions, certifications, flashcards, voice sessions, learning paths, coding challenges.
# Runs daily at 2 AM UTC; supports per-type manual triggers.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Content type (blank = all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - questions
          - certifications
          - flashcards
          - voice
          - paths
          - challenges
      channel:
        description: 'Specific channel/category (optional)'
        required: false
        default: ''
      workers:
        description: 'Max parallel workers'
        required: false
        default: '5'
      model:
        description: 'LLM model override (optional)'
        required: false
        default: ''

concurrency:
  group: content-generation-${{ github.event_name == 'schedule' && 'scheduled' || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    name: 🚀 Run Content Swarm
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot

      - name: Build swarm arguments
        id: args
        run: |
          ARGS="--workers=${{ inputs.workers || '5' }}"
          [ -n "${{ inputs.type }}"    ] && ARGS="$ARGS --type=${{ inputs.type }}"
          [ -n "${{ inputs.channel }}" ] && ARGS="$ARGS --channel=${{ inputs.channel }}"
          [ -n "${{ inputs.model }}"   ] && ARGS="$ARGS --model=${{ inputs.model }}"
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Swarm args: $ARGS"

      - name: Run parallel content swarm
        run: npx tsx scripts/parallel-content-swarm.ts ${{ steps.args.outputs.args }}

      - name: Export static data (parallel, non-fatal)
        run: |
          node script/fetch-questions-for-build.js &
          node script/fetch-question-history.js    &
          node script/fetch-bot-monitor-data.js    &
          wait
        continue-on-error: true

      - name: Commit generated content
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Content Swarm Bot"
          git add -f client/public/data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: content swarm generation [skip ci]"
          git push || echo "::warning::Push failed (possible concurrent run)"

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🤖 Content Swarm Summary"
            echo ""
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| Type    | ${{ inputs.type || 'all' }} |"
            echo "| Workers | ${{ inputs.workers || '5' }} |"
            echo "| Channel | ${{ inputs.channel || 'all' }} |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Time    | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |"
          } >> "$GITHUB_STEP_SUMMARY"

  post-generation:
    name: 🧹 Post-Generation Tasks
    needs: generate
    if: always() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Run maintenance & static asset generation (parallel, non-fatal)
        run: |
          node script/maintenance/clear-old-new-flags.js &
          node script/generate-curated-paths.js          &
          node script/generate-rss.js                    &
          node script/generate-sitemap.js                &
          wait
        continue-on-error: true

      - name: Commit static assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Maintenance Bot"
          git add client/public/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: post-generation static assets [skip ci]"
          git push || echo "::warning::Push failed"
