name: 🚀 Deploy Blog

# Builds and deploys the static blog from existing content (no AI generation).
# Runs daily at 5 AM UTC or after a successful Content Generation run.

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["🤖 Content Generation"]
    types: [completed]

jobs:
  deploy:
    name: 📦 Build & Deploy Blog
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build static blog
        run: node script/generate-blog.js --html-only
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}

      - uses: ./.github/actions/deploy-pages
        with:
          source-dir: blog-output
          repo: openstackdaily/openstackdaily.github.io
          branch: main
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'Deploy: ${{ github.sha }}'
          preserve-cname: 'true'

      - name: Summary
        run: |
          ARTICLE_COUNT=$(find blog-output/posts -type f -name 'index.html' 2>/dev/null | wc -l)
          {
            echo "## 🚀 Blog Deployed"
            echo ""
            echo "**URL:** https://openstackdaily.github.io"
            echo "**Articles:** $ARTICLE_COUNT"
            echo "**Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
