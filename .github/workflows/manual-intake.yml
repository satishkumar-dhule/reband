name: 🎲 Manual Intake

# Manually add a question to the database and trigger a deploy.

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'Question text (will be mapped to a channel and refined)'
        required: true
        type: string

jobs:
  intake:
    name: 📥 Process Question
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bot

      - name: Validate input
        run: |
          Q="${{ inputs.question }}"
          if [ -z "$Q" ]; then
            echo "❌ Question cannot be empty"
            exit 1
          fi
          if [ ${#Q} -lt 10 ]; then
            echo "❌ Question must be at least 10 characters"
            exit 1
          fi
          if [ ${#Q} -gt 5000 ]; then
            echo "❌ Question must be under 5000 characters"
            exit 1
          fi
          echo "✅ Input validated (${#Q} chars)"

      - name: Process and add question
        run: node script/add-random-question.js
        env:
          INPUT_QUESTION: ${{ inputs.question }}
          GITHUB_TOKEN:   ${{ secrets.GH_TOKEN }}
          CI: 'true'

      - name: Regenerate RSS feed
        run: node script/generate-rss.js
        continue-on-error: true

      - name: Trigger app deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'deploy-app.yml',
              ref: 'main'
            });
            console.log('✅ Deploy triggered');

      - name: Summary
        run: |
          {
            echo "## 🎲 Question Added"
            echo ""
            echo "**Input:** ${{ inputs.question }}"
            echo ""
            echo "- ✅ Question processed and added"
            echo "- ✅ RSS feed regenerated"
            echo "- ✅ Deploy triggered"
          } >> "$GITHUB_STEP_SUMMARY"
