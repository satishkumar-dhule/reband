name: 📊 Social Media & Analytics

# LinkedIn posts, polls, and GitHub analytics collection.

on:
  schedule:
    # 7 AM UTC: LinkedIn post (after all deploys complete)
    - cron: '0 7 * * *'
    # 10 AM UTC: LinkedIn poll
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        default: 'all'
        type: choice
        options: [all, linkedin-post, linkedin-poll, analytics]
      post_url:
        description: 'Blog post URL (linkedin-post only)'
        required: false
      question_id:
        description: 'Question ID (linkedin-poll only)'
        required: false
        default: ''
      channel:
        description: 'Channel filter (linkedin-poll only)'
        required: false
        default: ''
      difficulty:
        description: 'Difficulty filter (linkedin-poll only)'
        required: false
        default: 'beginner'
        type: choice
        options: [beginner, intermediate, advanced]
      poll_duration:
        description: 'Poll duration in hours'
        required: false
        default: '24'
      dry_run:
        description: 'Dry run (test without posting)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

jobs:
  linkedin-post:
    name: 📢 LinkedIn Post
    if: >
      github.event.schedule == '0 7 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.task == 'all' || inputs.task == 'linkedin-post'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot

      - name: Get latest blog post
        id: get_post
        run: node script/get-latest-blog-post.js
        env:
          SPECIFIC_URL: ${{ inputs.post_url }}

      - name: Publish to LinkedIn
        if: steps.get_post.outputs.has_post == 'true'
        id: publish
        run: node script/publish-to-linkedin.js
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:   ${{ secrets.LINKEDIN_PERSON_URN }}
          POST_TITLE:   ${{ steps.get_post.outputs.title }}
          POST_URL:     ${{ steps.get_post.outputs.url }}
          POST_EXCERPT: ${{ steps.get_post.outputs.excerpt }}
          POST_TAGS:    ${{ steps.get_post.outputs.tags }}
          POST_CHANNEL: ${{ steps.get_post.outputs.channel }}
          OLLAMA_URL:   ${{ secrets.OLLAMA_URL }}

      - name: Mark post as shared
        if: steps.get_post.outputs.has_post == 'true' && steps.publish.outputs.posted == 'true'
        run: node script/mark-post-shared.js
        env:
          POST_ID: ${{ steps.get_post.outputs.post_id }}

  linkedin-poll:
    name: 📊 LinkedIn Poll
    if: >
      github.event.schedule == '0 10 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.task == 'all' || inputs.task == 'linkedin-poll'))
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      blog_generated: ${{ steps.poll.outputs.blog_generated }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot

      - name: Post poll to LinkedIn
        id: poll
        run: node script/post-linkedin-poll.js
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:   ${{ secrets.LINKEDIN_PERSON_URN }}
          OLLAMA_URL:     ${{ secrets.OLLAMA_URL }}
          QDRANT_URL:     ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QUESTION_ID:    ${{ inputs.question_id }}
          CHANNEL:        ${{ inputs.channel }}
          DIFFICULTY:     ${{ inputs.difficulty || 'beginner' }}
          POLL_DURATION:  ${{ inputs.poll_duration || '24' }}
          DRY_RUN:        ${{ inputs.dry_run || 'false' }}

      - name: Trigger blog deploy (if new post generated)
        if: steps.poll.outputs.blog_generated == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'deploy-blog.yml',
              ref: 'main'
            });
            console.log('✅ Blog deploy triggered');

  analytics:
    name: 📈 GitHub Analytics
    if: >
      github.event.schedule == '0 7 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.task == 'all' || inputs.task == 'analytics'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Collect GitHub analytics
        run: node script/github-analytics-bot.js
        env:
          GITHUB_TOKEN:      ${{ secrets.GH_TOKEN }}
          REPO_OWNER:        satishkumar-dhule
          REPO_NAME:         code-reels
          PAGES_REPO_OWNER:  open-interview
          PAGES_REPO_NAME:   open-interview.github.io

  summary:
    name: 📋 Summary
    needs: [linkedin-post, linkedin-poll, analytics]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate summary
        run: |
          result() { case "$1" in success) echo "✅";; skipped) echo "⏭️";; *) echo "❌";; esac; }
          {
            echo "## 📊 Social Media & Analytics Summary"
            echo ""
            echo "| Task | Status | Notes |"
            echo "|------|--------|-------|"
            echo "| 📢 LinkedIn Post | $(result "${{ needs.linkedin-post.result }}") | Blog post shared |"
            echo "| 📊 LinkedIn Poll | $(result "${{ needs.linkedin-poll.result }}") | ${{ needs.linkedin-poll.outputs.blog_generated == 'true' && '📝 New blog + deploy triggered' || 'No new blog' }} |"
            echo "| 📈 Analytics     | $(result "${{ needs.analytics.result }}")     | GitHub stats collected |"
            echo ""
            echo "**Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
