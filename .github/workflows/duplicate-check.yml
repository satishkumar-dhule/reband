name: 🔍 Duplicate Detection

on:
  schedule:
    # Weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      content_type:
        description: 'Content type to check'
        required: false
        default: 'question'
        type: choice
        options: [question, challenge, test, certification]
      channel:
        description: 'Specific channel (blank = all)'
        required: false
        default: ''
      auto_fix:
        description: 'Automatically fix duplicates'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  check-duplicates:
    name: 🔍 Check for Duplicates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Validate inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ -n "${{ inputs.channel }}" ]] && \
             [[ ! "${{ inputs.channel }}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Invalid channel — only alphanumeric, hyphens, underscores allowed"
            exit 1
          fi
          echo "✅ Inputs validated"

      - name: Check Vector DB status
        env:
          QDRANT_URL:     ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: pnpm run vector:stats || echo "Vector DB unavailable — fallback mode"

      - name: Run duplicate detection
        id: duplicate-check
        env:
          QDRANT_URL:     ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          ARGS=("--report")
          ARGS+=("--type=${{ inputs.content_type || 'question' }}")
          [ -n "${{ inputs.channel }}" ]  && ARGS+=("--channel=${{ inputs.channel }}")
          [ "${{ inputs.auto_fix }}" == "true" ] && ARGS+=("--fix")
          echo "Running: node script/check-duplicates.js ${ARGS[*]}"
          node script/check-duplicates.js "${ARGS[@]}"

      - name: Upload duplicate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-report-${{ github.run_number }}
          path: duplicate-report-*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Create issue if duplicates found
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.startsWith('duplicate-report-'));
            if (!files.length) return;

            const report = JSON.parse(fs.readFileSync(files[0], 'utf8'));
            if (!report.duplicateCount) return;

            const pairs = report.duplicatePairs.slice(0, 10).map(p => {
              const dups = p.duplicates.map(d => `\`${d.id}\` (${d.similarity}%)`).join(', ');
              return `- \`${p.original}\` → ${dups}`;
            }).join('\n');

            const more = report.duplicatePairs.length > 10
              ? `\n_...and ${report.duplicatePairs.length - 10} more pairs_`
              : '';

            const channelArg = report.channel ? ` --channel=${report.channel}` : '';
            const typeArg    = `--type=${report.contentType}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 Duplicates Detected: ${report.duplicateCount} pairs found`,
              labels: ['duplicate', 'content-quality', 'automated'],
              body: [
                '## Duplicate Detection Report',
                '',
                `**Content Type:** ${report.contentType}`,
                `**Channel:** ${report.channel || 'all'}`,
                `**Total Scanned:** ${report.totalScanned}`,
                `**Duplicate Pairs:** ${report.duplicateCount}`,
                '',
                '### Duplicate Pairs',
                pairs + more,
                '',
                '### How to Fix',
                '```bash',
                `# Review\npnpm run check:duplicates -- ${typeArg}${channelArg}`,
                `# Auto-fix\npnpm run check:duplicates:fix -- ${typeArg}${channelArg}`,
                '```',
                '',
                `---`,
                `_Generated by [Duplicate Detection Workflow](${context.payload.repository.html_url}/actions/runs/${context.runId})_`
              ].join('\n')
            });

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🔍 Duplicate Detection Results"
            echo ""
            echo "**Content Type:** ${{ inputs.content_type || 'question' }}"
            echo "**Channel:** ${{ inputs.channel || 'all' }}"
            echo "**Auto-fix:** ${{ inputs.auto_fix || 'false' }}"
            echo "**Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            ls duplicate-report-*.json 2>/dev/null && echo "📄 Detailed report in artifacts" || true
          } >> "$GITHUB_STEP_SUMMARY"

  reconcile:
    name: 🔄 Reconcile After Cleanup
    needs: check-duplicates
    if: inputs.auto_fix == true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Run reconciliation
        env:
          QDRANT_URL:     ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: pnpm run bot:reconcile --threshold=0.75

      - name: Summary
        run: |
          {
            echo "## 🔄 Reconciliation Complete"
            echo "Content reconciled after duplicate cleanup."
          } >> "$GITHUB_STEP_SUMMARY"
