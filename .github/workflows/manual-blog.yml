name: 📝 Manual Blog Post

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Question or topic to generate a blog post from'
        required: true
        type: string
      publish:
        description: 'Deploy blog after generation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  actions: write

jobs:
  generate:
    name: 📰 Generate Blog Post
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot

      - name: Generate blog post
        id: generate
        run: node script/generate-blog-from-input.js
        env:
          INPUT_TOPIC:    ${{ inputs.topic }}
          QDRANT_URL:     ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          OLLAMA_URL:     ${{ secrets.OLLAMA_URL }}
          GITHUB_TOKEN:   ${{ secrets.GH_TOKEN }}

      - name: Trigger blog deploy
        if: success() && inputs.publish
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'deploy-blog.yml',
              ref: 'main'
            });
            console.log('✅ Blog deploy triggered');

      - name: Summary
        if: always()
        run: |
          {
            echo "## 📝 Blog Post Generation"
            echo ""
            echo "**Topic:** ${{ inputs.topic }}"
            echo ""
            if [ "${{ steps.generate.outputs.success }}" == "true" ]; then
              echo "✅ **Title:** ${{ steps.generate.outputs.title }}"
              echo "**Channel:** ${{ steps.generate.outputs.channel }}"
              [ "${{ inputs.publish }}" == "true" ] && echo "🚀 Blog deploy triggered"
            else
              echo "❌ Generation failed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
