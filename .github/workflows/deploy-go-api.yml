name: 🐹 Deploy Go API → Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'go-api/**'
      - '.github/workflows/deploy-go-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'go-api/**'
  workflow_dispatch:

concurrency:
  group: deploy-go-api-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.23'

jobs:
  ci:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: go-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-api/go.sum

      - name: Tidy & verify modules
        run: go mod tidy && go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test -race -timeout 60s ./...

      - name: Build local server binary
        run: make build

      - name: Build WASM worker
        run: |
          GOOS=js GOARCH=wasm go build -tags worker \
            -trimpath -ldflags="-s -w" \
            -o dist/app.wasm ./worker/

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-api-wasm-${{ github.sha }}
          path: go-api/dist/app.wasm
          retention-days: 7

  deploy:
    name: 🚀 Deploy to Cloudflare Workers
    needs: ci
    if: >
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: go-api
    environment:
      name: production
      url: https://devprep-go-api.workers.dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-api/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Tidy modules
        run: go mod tidy

      - name: Build WASM worker + JS glue
        run: make build-worker

      - name: Push secrets to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          printf '%s' "${{ secrets.LIBSQL_URL }}" \
            | wrangler secret put LIBSQL_URL --config wrangler.toml
          printf '%s' "${{ secrets.LIBSQL_AUTH_TOKEN }}" \
            | wrangler secret put LIBSQL_AUTH_TOKEN --config wrangler.toml

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config wrangler.toml

      - name: Smoke test deployed worker
        run: |
          WORKER_URL="https://devprep-go-api.workers.dev"
          echo "Health check: $WORKER_URL/health"
          STATUS=$(curl -sSf -o /dev/null -w "%{http_code}" "$WORKER_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "✗ Health check returned HTTP $STATUS"
            exit 1
          fi
          echo "✓ Worker is healthy (HTTP $STATUS)"
