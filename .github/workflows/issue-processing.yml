name: 🔄 Issue Processing

# Unified issue processing: handles local issues and cross-repo external issues.

on:
  issues:
    types: [opened, labeled]

  schedule:
    # Every 15 min: sync external issues
    - cron: '*/15 * * * *'
    # Every 30 min: process local issues + cleanup stale
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      source:
        description: 'Issue source'
        required: true
        default: 'local'
        type: choice
        options: [local, external, both]
      source_repo:
        description: 'External repo (owner/repo)'
        required: false
        default: 'open-interview/open-interview.github.io'
      max_issues:
        description: 'Max issues to process'
        required: false
        default: '10'
      force_reprocess:
        description: 'Force reprocess completed issues'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  SOURCE_REPO: ${{ inputs.source_repo || 'open-interview/open-interview.github.io' }}

jobs:
  check-trigger:
    name: 🔍 Check Trigger
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_process_local: ${{ steps.check.outputs.should_process_local }}
      should_process_external: ${{ steps.check.outputs.should_process_external }}
      run_cleanup: ${{ steps.check.outputs.run_cleanup }}
      issue_number: ${{ steps.check.outputs.issue_number }}
    steps:
      - name: Validate inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ -n "${{ inputs.source_repo }}" ]] && \
             [[ ! "${{ inputs.source_repo }}" =~ ^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$ ]]; then
            echo "❌ Invalid source_repo format: must be owner/repo"
            exit 1
          fi
          if [[ -n "${{ inputs.max_issues }}" ]] && \
             [[ ! "${{ inputs.max_issues }}" =~ ^[1-9][0-9]*$ ]]; then
            echo "❌ max_issues must be a positive integer"
            exit 1
          fi
          echo "✅ Inputs validated"

      - name: Determine what to process
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { eventName, payload } = context;

            // Issue event — check label
            if (eventName === 'issues') {
              const labels = payload.issue.labels.map(l => l.name);
              const forceReprocess = '${{ inputs.force_reprocess }}' === 'true';
              if (labels.includes('bot:in-progress') ||
                  (labels.includes('bot:completed') && !forceReprocess)) {
                core.setOutput('should_process_local',    'false');
                core.setOutput('should_process_external', 'false');
                core.setOutput('run_cleanup',             'false');
                return;
              }
              if (labels.includes('bot:processor')) {
                core.setOutput('should_process_local',    'true');
                core.setOutput('should_process_external', 'false');
                core.setOutput('run_cleanup',             'false');
                core.setOutput('issue_number', payload.issue.number.toString());
                return;
              }
              core.setOutput('should_process_local',    'false');
              core.setOutput('should_process_external', 'false');
              core.setOutput('run_cleanup',             'false');
              return;
            }

            // Manual dispatch
            if (eventName === 'workflow_dispatch') {
              const source = '${{ inputs.source }}';
              core.setOutput('should_process_local',    (source === 'local'  || source === 'both').toString());
              core.setOutput('should_process_external', (source === 'external' || source === 'both').toString());
              core.setOutput('run_cleanup',             'false');
              core.setOutput('issue_number', '');
              return;
            }

            // Scheduled — distinguish by minute
            const minute = new Date().getUTCMinutes();
            const isHalfHour = minute % 30 === 0;   // */30 cron
            const isQuarter  = minute % 15 === 0;   // */15 cron (also catches */30)

            // */15 only (not on the half-hour) → external sync
            const externalOnly = isQuarter && !isHalfHour;
            core.setOutput('should_process_external', (isQuarter).toString());
            core.setOutput('should_process_local',    (isHalfHour).toString());
            core.setOutput('run_cleanup',             (isHalfHour).toString());
            core.setOutput('issue_number', '');

  process-local:
    name: ⚙️ Process Local Issues
    needs: check-trigger
    if: needs.check-trigger.outputs.should_process_local == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot

      - name: Add in-progress label
        if: needs.check-trigger.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const n = parseInt('${{ needs.check-trigger.outputs.issue_number }}');
            if (n) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: n,
                labels: ['bot:in-progress']
              });
            }

      - name: Run Processor Bot
        env:
          QDRANT_URL:     ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          OLLAMA_URL:     ${{ secrets.OLLAMA_URL }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:    ${{ github.repository }}
          MAX_ISSUES:     ${{ inputs.max_issues || '10' }}
          SINGLE_ISSUE:   ${{ needs.check-trigger.outputs.issue_number }}
        run: node script/bots/processor-bot.js

      - name: Sync to Vector DB (incremental)
        if: success()
        env:
          QDRANT_URL:     ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: node script/sync-vector-db.js --mode=incremental || true

  process-external:
    name: 🔗 Process External Issues
    needs: check-trigger
    if: needs.check-trigger.outputs.should_process_external == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bot

      - name: Fetch & label external issues
        id: fetch
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const [sourceOwner, sourceRepoName] = process.env.SOURCE_REPO.split('/');
            const maxIssues = parseInt('${{ inputs.max_issues || '10' }}');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: sourceOwner, repo: sourceRepoName,
              labels: 'bot:processor', state: 'open',
              per_page: maxIssues, sort: 'created', direction: 'desc'
            });

            const toProcess = issues.filter(i => {
              const lbls = i.labels.map(l => l.name);
              return !lbls.includes('bot:in-progress') && !lbls.includes('bot:completed');
            });

            const processed = [];
            for (const issue of toProcess) {
              await github.rest.issues.addLabels({
                owner: sourceOwner, repo: sourceRepoName,
                issue_number: issue.number, labels: ['bot:in-progress']
              });
              processed.push({ number: issue.number, title: issue.title,
                               body: issue.body, url: issue.html_url });
            }

            require('fs').writeFileSync('/tmp/external-issues.json',
              JSON.stringify(processed, null, 2));
            core.setOutput('processed_count', processed.length.toString());
            core.setOutput('issues', JSON.stringify(processed));

      - name: Process external issues
        if: steps.fetch.outputs.processed_count != '0'
        env:
          QDRANT_URL:             ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY:         ${{ secrets.QDRANT_API_KEY }}
          OLLAMA_URL:             ${{ secrets.OLLAMA_URL }}
          EXTERNAL_ISSUES_FILE:   /tmp/external-issues.json
        run: node script/bots/processor-bot.js --external-issues

      - name: Update external issue labels & close
        if: always() && steps.fetch.outputs.processed_count != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const [sourceOwner, sourceRepoName] = process.env.SOURCE_REPO.split('/');
            const issues = JSON.parse('${{ steps.fetch.outputs.issues }}');
            for (const issue of issues) {
              try {
                await github.rest.issues.removeLabel({
                  owner: sourceOwner, repo: sourceRepoName,
                  issue_number: issue.number, name: 'bot:in-progress'
                }).catch(() => {});
                await github.rest.issues.addLabels({
                  owner: sourceOwner, repo: sourceRepoName,
                  issue_number: issue.number, labels: ['bot:completed']
                });
                await github.rest.issues.createComment({
                  owner: sourceOwner, repo: sourceRepoName,
                  issue_number: issue.number,
                  body: '✅ **Processing Complete** — Processed by main repository.'
                });
                await github.rest.issues.update({
                  owner: sourceOwner, repo: sourceRepoName,
                  issue_number: issue.number, state: 'closed'
                });
              } catch (err) {
                console.log(`Error on #${issue.number}: ${err.message}`);
              }
            }

  cleanup-stale:
    name: 🧹 Cleanup Stale Labels
    needs: check-trigger
    if: needs.check-trigger.outputs.run_cleanup == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Remove stale in-progress labels (> 1 hour old)
        uses: actions/github-script@v7
        with:
          script: |
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000);
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'bot:in-progress', state: 'open', per_page: 50
            });
            for (const issue of issues) {
              if (new Date(issue.updated_at) < oneHourAgo) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, name: 'bot:in-progress'
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '⚠️ **Processing Reset** — Stuck >1 hour. Label removed for reprocessing.'
                });
              }
            }

  summary:
    name: 📋 Summary
    needs: [check-trigger, process-local, process-external, cleanup-stale]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate summary
        run: |
          result() { case "$1" in success) echo "✅";; skipped) echo "⏭️";; *) echo "❌";; esac; }
          {
            echo "## 🔄 Issue Processing Summary"
            echo ""
            echo "| Task | Status |"
            echo "|------|--------|"
            echo "| ⚙️ Local Issues   | $(result "${{ needs.process-local.result }}")    |"
            echo "| 🔗 External Issues | $(result "${{ needs.process-external.result }}") |"
            echo "| 🧹 Stale Cleanup  | $(result "${{ needs.cleanup-stale.result }}")    |"
            echo ""
            echo "**Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
