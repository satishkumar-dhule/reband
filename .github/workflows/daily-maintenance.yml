name: 🧹 Daily Maintenance

# Clears old "NEW" flags and runs lightweight DB maintenance tasks.

on:
  schedule:
    # 3 AM UTC — after content generation (2 AM) completes
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintenance:
    name: 🧹 Run Maintenance Tasks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Run DB migrations (idempotent)
        run: node script/migrations/add-is-new-column.js 2>/dev/null || true

      - name: Clear old NEW flags (questions older than 7 days)
        run: node script/maintenance/clear-old-new-flags.js

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🧹 Daily Maintenance Results"
            echo ""
            echo "- ✅ DB migrations checked"
            echo "- ✅ OLD NEW flags cleared"
            echo ""
            echo "**Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
