name: 🧹 Daily Maintenance

# Runs daily to clear old "NEW" flags and perform other maintenance tasks

on:
  schedule:
    # Run daily at 3 AM UTC (after content generation at 2 AM completes)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maintenance:
    name: 🧹 Run Maintenance Tasks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - uses: ./.github/actions/setup-bot
      
      - name: Run migrations (if needed)
        env:
        run: |
          echo "🔄 Running database migrations..."
          node script/migrations/add-is-new-column.js || echo "⚠️  Migration skipped or already applied"
      
      - name: Clear old NEW flags
        env:
        run: |
          echo "🧹 Clearing NEW flags for questions older than 7 days..."
          node script/maintenance/clear-old-new-flags.js
      
      - name: Generate Summary
        if: always()
        run: |
          echo "## 🧹 Daily Maintenance Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tasks completed:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cleared old NEW flags" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
