name: 🎓 Generate Learning Paths

on:
  schedule:
    # Daily at 4 AM UTC — after content generation (2 AM) and maintenance (3 AM)
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-paths:
    name: 🎓 Generate Curated Paths
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Generate curated learning paths
        run: node script/generate-curated-paths.js

      - name: Commit if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Curated Paths Bot"
          git add -A
          git diff --staged --quiet || \
            git commit -m "chore: update curated learning paths [skip ci]"
          git push || echo "::warning::Push failed (nothing to push or concurrent run)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🎓 Learning Paths Generation"
            echo "**Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
