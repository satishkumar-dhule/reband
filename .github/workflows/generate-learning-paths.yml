name: Generate Curated Learning Paths

on:
  schedule:
    # Run daily at 4 AM UTC (after content generation and maintenance complete)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-paths:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Setup database
        env:
        run: |
          echo "Database URL configured"

      - name: Generate curated learning paths
        env:
        run: |
          node script/generate-curated-paths.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'Curated Paths Bot'
          git config --global user.email 'bot@github-actions'
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "🎓 Update curated learning paths [automated]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
