name: 🚀 Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/content-pipeline.yml'
      - '.github/workflows/deploy-blog.yml'
      - '.github/workflows/social-analytics.yml'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Fetch and generate data (parallel)
        run: |
          echo "Starting parallel data fetching..."
          mkdir -p logs
          
          node script/fetch-questions-for-build.js > logs/fetch-questions.log 2>&1 &
          PID1=$!
          node script/fetch-question-history.js > logs/fetch-history.log 2>&1 &
          PID2=$!
          node script/generate-curated-paths.js > logs/generate-paths.log 2>&1 &
          PID3=$!
          node script/generate-rss.js > logs/generate-rss.log 2>&1 &
          PID4=$!
          node script/generate-sitemap.js > logs/generate-sitemap.log 2>&1 &
          PID5=$!
          node script/fetch-bot-monitor-data.js > logs/fetch-bot-monitor.log 2>&1 &
          PID6=$!
          
          FAILED_PIDS=""
          for pid in $PID1 $PID2 $PID3 $PID4 $PID5 $PID6; do
            if ! wait $pid; then
              FAILED_PIDS="$FAILED_PIDS $pid"
            fi
          done
          
          if [ -n "$FAILED_PIDS" ]; then
            echo "❌ The following data fetching scripts failed:$FAILED_PIDS"
            echo ""
            echo "Failure details:"
            for pid in $FAILED_PIDS; do
              case $pid in
                $PID1) echo "- fetch-questions-for-build.js"; cat logs/fetch-questions.log ;;
                $PID2) echo "- fetch-question-history.js"; cat logs/fetch-history.log ;;
                $PID3) echo "- generate-curated-paths.js"; cat logs/generate-paths.log ;;
                $PID4) echo "- generate-rss.js"; cat logs/generate-rss.log ;;
                $PID5) echo "- generate-sitemap.js"; cat logs/generate-sitemap.log ;;
                $PID6) echo "- fetch-bot-monitor-data.js"; cat logs/fetch-bot-monitor.log ;;
              esac
            done
            exit 1
          fi
          
          echo "✅ All data fetching scripts completed successfully"

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: |
            dist
            client/public/data
          key: ${{ runner.os }}-cf-dist-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('client/src/**/*.{ts,tsx}', 'vite.config.ts', 'shared/**/*.{ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-cf-dist-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-cf-dist-

      - name: Install Playwright (if not cached)
        run: |
          if [ ! -d "$HOME/.cache/ms-playwright" ] || [ -z "$(ls -A "$HOME/.cache/ms-playwright")" ]; then
            echo "Installing Playwright browsers..."
            pnpm exec playwright install --with-deps chromium
          else
            echo "Playwright browsers cached, skipping install"
          fi

      - name: Build application
        run: |
          pnpm run build
          pnpm run build:pagefind
          node script/build-optimize.js

      - name: Run E2E tests
        run: |
          pnpm exec playwright test e2e/core.spec.ts --project=chromium-desktop
        continue-on-error: true
        env:
          CI: 'true'
          SERVE_STATIC: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:5001'

      - name: Compress test results
        if: failure()
        run: |
          tar -czf test-results.tar.gz test-results/ 2>/dev/null || true
        shell: bash

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cf-test-results
          path: test-results.tar.gz
          retention-days: 3

      - name: Compress build artifacts
        run: |
          tar -czf build.tar.gz -C dist/public .
          echo "Build artifact size: $(du -sh build.tar.gz | cut -f1)"
        shell: bash

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: cf-build
          path: build.tar.gz
          retention-days: 1

  staging:
    name: 🧪 Deploy Staging (Cloudflare)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.devprep-pages.pages.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cf-build
          path: .
      
      - name: Decompress build artifacts
        run: |
          mkdir -p dist/public
          tar -xzf build.tar.gz -C dist/public
          rm build.tar.gz
        shell: bash

      - name: Setup Node & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Ensure Cloudflare Pages project exists
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/devprep-pages")
          if [ "$STATUS" = "404" ]; then
            echo "Project not found, creating devprep-pages..."
            curl -s -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"name":"devprep-pages","production_branch":"main"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" | python3 -c "import json,sys; r=json.load(sys.stdin); print('Created:', r.get('success'))"
          else
            echo "Project devprep-pages already exists (HTTP $STATUS)."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Setup D1 database and apply migrations
        run: |
          # Create D1 database (no-op if it already exists)
          CREATE_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"devprep"}' \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database")
          D1_ID=$(echo "$CREATE_RESP" | python3 -c "import json,sys; r=json.load(sys.stdin); print(r['result']['uuid'] if r.get('success') else '')" 2>/dev/null || true)

          # If creation returned no ID (already exists), look it up
          if [ -z "$D1_ID" ]; then
            echo "Database may already exist, fetching ID..."
            LIST_RESP=$(curl -s \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database?name=devprep")
            D1_ID=$(echo "$LIST_RESP" | python3 -c "import json,sys; r=json.load(sys.stdin); dbs=r.get('result',[]); print(dbs[0]['uuid'] if dbs else '')" 2>/dev/null || true)
          fi

          if [ -z "$D1_ID" ]; then
            echo "❌ Could not create or find D1 database"
            exit 1
          fi
          echo "✅ D1 Database ID: $D1_ID"

          # Substitute into wrangler.toml so wrangler knows the DB ID
          sed -i "s/__D1_DATABASE_ID__/$D1_ID/" wrangler.toml

          # Apply migrations
          echo "Applying D1 migrations..."
          npx wrangler d1 migrations apply devprep --remote
          echo "✅ Migrations applied"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (staging)
        run: |
          npx wrangler pages deploy dist/public \
            --project-name=devprep-pages \
            --branch=staging \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  production:
    name: 🌐 Deploy Production (Cloudflare)
    needs: staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://devprep-pages.pages.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cf-build
          path: .
      
      - name: Decompress build artifacts
        run: |
          mkdir -p dist/public
          tar -xzf build.tar.gz -C dist/public
          rm build.tar.gz
        shell: bash

      - name: Setup Node & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Resolve D1 database ID
        run: |
          LIST_RESP=$(curl -s \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database?name=devprep")
          D1_ID=$(echo "$LIST_RESP" | python3 -c "import json,sys; r=json.load(sys.stdin); dbs=r.get('result',[]); print(dbs[0]['uuid'] if dbs else '')" 2>/dev/null || true)
          if [ -z "$D1_ID" ]; then
            echo "❌ Could not resolve D1 database ID"
            exit 1
          fi
          echo "✅ D1 Database ID: $D1_ID"
          sed -i "s/__D1_DATABASE_ID__/$D1_ID/" wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (production)
        run: |
          npx wrangler pages deploy dist/public \
            --project-name=devprep-pages \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Ping search engines
        run: node script/ping-search-engines.js
        continue-on-error: true

      - name: Summary
        run: |
          echo "## 🚀 Cloudflare Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | https://staging.devprep-pages.pages.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | https://devprep-pages.pages.dev |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  verify-deployment:
    name: 🔍 Verify Production Deployment
    needs: production
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to propagate
        run: sleep 30
      
      - name: Verify site accessibility
        run: |
          echo "Checking if production site is accessible..."
          if ! curl -s --max-time 30 --retry 3 --retry-delay 5 "https://devprep-pages.pages.dev" > /dev/null; then
            echo "❌ Production site is not accessible"
            exit 1
          fi
          if ! curl -s --max-time 30 --retry 3 --retry-delay 5 "https://staging.devprep-pages.pages.dev" > /dev/null; then
            echo "❌ Staging site is not accessible"
            exit 1
          fi
          echo "✅ Both sites are accessible"

      - name: Verify API health (Pages Functions + D1)
        run: |
          echo "Checking API health endpoint..."
          api_response=$(curl -s --max-time 30 --retry 3 --retry-delay 5 \
            -H "Accept: application/json" \
            "https://devprep-pages.pages.dev/api/health")
          echo "Response: $api_response"
          if echo "$api_response" | python3 -c "import json,sys; r=json.load(sys.stdin); exit(0 if r.get('status')=='ok' else 1)"; then
            echo "✅ API health check passed"
          else
            echo "❌ API health check failed"
            exit 1
          fi

      - name: Verify critical pages
        run: |
          echo "Checking critical pages..."
          critical_pages=(
            "https://devprep-pages.pages.dev"
            "https://devprep-pages.pages.dev/practice"
            "https://devprep-pages.pages.dev/learn"
          )
          for page in "${critical_pages[@]}"; do
            echo "Checking: $page"
            if ! curl -s --max-time 30 --retry 2 --retry-delay 3 "$page" > /dev/null; then
              echo "❌ Failed to access: $page"
              exit 1
            fi
          done
          echo "✅ All critical pages accessible"
