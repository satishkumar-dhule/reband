name: 🧪 Manual E2E Tests

on:
  workflow_dispatch:
    inputs:
      pattern:
        description: 'Test file or grep pattern (e.g. "e2e/home.spec.ts" or "search")'
        required: true
        type: string
      browser:
        description: 'Browser'
        required: false
        default: 'chromium'
        type: choice
        options: [chromium, firefox, webkit, all]
      retries:
        description: 'Retry count'
        required: false
        default: '2'
        type: string

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Validate inputs
        run: |
          if [[ "${{ inputs.pattern }}" =~ ['`$] ]]; then
            echo "❌ Pattern contains unsafe characters"
            exit 1
          fi
          if [[ ! "${{ inputs.retries }}" =~ ^[0-9]+$ ]]; then
            echo "❌ retries must be a non-negative integer"
            exit 1
          fi
          echo "✅ Inputs validated"

      - name: Fetch test data
        run: node script/fetch-questions-for-build.js
        continue-on-error: true

      - name: Install Playwright browsers
        run: |
          if [ "${{ inputs.browser }}" = "all" ]; then
            pnpm exec playwright install --with-deps
          else
            pnpm exec playwright install --with-deps ${{ inputs.browser }}
          fi

      - name: Build application
        run: pnpm run build && pnpm run build:pagefind

      - name: Run tests
        run: |
          BROWSER_FLAG=""
          [ "${{ inputs.browser }}" != "all" ] && BROWSER_FLAG="--project=${{ inputs.browser }}"

          PATTERN="${{ inputs.pattern }}"
          if [[ "$PATTERN" == *".spec.ts"* ]] || [[ "$PATTERN" == *"e2e/"* ]]; then
            pnpm exec playwright test "$PATTERN" $BROWSER_FLAG \
              --retries=${{ inputs.retries }}
          else
            pnpm exec playwright test --grep "$PATTERN" $BROWSER_FLAG \
              --retries=${{ inputs.retries }}
          fi
        env:
          CI: 'true'

      - name: Compress & upload results
        if: always()
        run: tar -czf test-results.tar.gz test-results/ playwright-report/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ github.run_number }}
          path: test-results.tar.gz
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🧪 E2E Test Results"
            echo ""
            echo "**Pattern:** \`${{ inputs.pattern }}\`"
            echo "**Browser:** ${{ inputs.browser }}"
            echo "**Retries:** ${{ inputs.retries }}"
          } >> "$GITHUB_STEP_SUMMARY"
