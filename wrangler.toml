# Cloudflare Pages + Workers Configuration
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "devprep-pages"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist/public"

[vars]
NODE_ENV = "production"
LOG_LEVEL = "info"

# ─── D1 Database ─────────────────────────────────────────────────────────────
# database_id is substituted by CI from the CLOUDFLARE_D1_DATABASE_ID secret
# Run locally: wrangler d1 create devprep  →  paste the id below
[[d1_databases]]
binding = "DB"
database_name = "devprep"
database_id = "__D1_DATABASE_ID__"
migrations_dir = "worker/migrations"

# ─── Routes (custom domain) ──────────────────────────────────────────────────
# [[routes]]
# pattern = "open-interview.com/*"
# zone_name = "open-interview.com"
