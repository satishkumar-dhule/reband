# Cloudflare Pages + Workers Configuration
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "devprep-pages"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist/public"

# Functions directory (Pages Functions for API routes)
# functions/ directory contains:
#   api/[[all]].ts  — Main Hono API router
#   go-api/[[all]].ts — Proxy to Go API service

[vars]
NODE_ENV = "production"
LOG_LEVEL = "info"

# ─── Environment Variables (set via Cloudflare dashboard or wrangler secret) ───
# TURSO_DATABASE_URL    — libsql://your-db.turso.io
# TURSO_AUTH_TOKEN      — auth token from Turso dashboard
# CORS_ORIGINS          — comma-separated allowed origins
# GO_API_URL            — Go API service URL (optional)

# ─── D1 Database (alternative to Turso HTTP) ─────────────────────────────────
# [[d1_databases]]
# binding = "DB"
# database_name = "devprep"
# database_id = "YOUR_D1_DATABASE_ID"
# migrations_dir = "worker/migrations"

# ─── Routes (custom domain) ──────────────────────────────────────────────────
# [[routes]]
# pattern = "open-interview.com/*"
# zone_name = "open-interview.com"
